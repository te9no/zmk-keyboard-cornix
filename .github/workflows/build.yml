name: Build ZMK firmware

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Regex matched against artifact-name, board, shield, and snippet. Use 'all' for every target."
        required: false
        default: "all"
      commit_firmware:
        description: "Commit built firmware files back to this branch."
        required: false
        default: true
        type: boolean
  schedule:
    # Daily build health check at 05:00 JST.
    - cron: "0 20 * * *"
  push:
    paths:
      - "config/**"
      - "boards/**"
      - "snippets/**"
      - "build.yaml"
      - "zephyr/module.yml"
      - ".github/workflows/build.yml"

permissions:
  contents: write
  actions: read
  issues: write

jobs:
  build:
    uses: te9no/zmk-workspace/.github/workflows/build-zmk-firmware.yml@main
    permissions:
      contents: write
      actions: read
    with:
      target: ${{ inputs.target || 'all' }}
      commit_firmware: ${{ github.event_name == 'push' || inputs.commit_firmware == true }}
      build_yaml: "build.yaml"
      firmware_folder: "firmware"
      update_build_health: true
      badge_folder: "badges/build-health"
      max_parallel: 4

  notify-daily-build-failure:
    name: Notify daily build failure
    runs-on: ubuntu-latest
    needs: build
    if: ${{ always() && github.event_name == 'schedule' && needs.build.result == 'failure' }}
    permissions:
      issues: write
      actions: read
      contents: read
    steps:
      - name: Create or update failure issue
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const title = 'Daily ZMK firmware build failed';
            const label = 'build-health';
            const runUrl = `${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`;
            const body = [
              '## Daily ZMK firmware build failed',
              '',
              `- Workflow: ${context.workflow}`,
              `- Branch: ${context.ref.replace('refs/heads/', '')}`,
              `- Run: ${runUrl}`,
              `- Triggered at: ${new Date().toISOString()}`,
              '',
              'Please inspect the failed build logs and fix the firmware configuration or module revision drift.'
            ].join('\n');

            try {
              await github.rest.issues.createLabel({
                owner,
                repo,
                name: label,
                color: 'D73A4A',
                description: 'Daily firmware build health checks'
              });
            } catch (error) {
              if (error.status !== 422) throw error;
            }

            const issues = await github.rest.issues.listForRepo({
              owner,
              repo,
              state: 'open',
              labels: label,
              per_page: 100
            });
            const existing = issues.data.find((issue) => issue.title === title);

            if (existing) {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: existing.number,
                body
              });
            } else {
              await github.rest.issues.create({
                owner,
                repo,
                title,
                body,
                labels: [label]
              });
            }
